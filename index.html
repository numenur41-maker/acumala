<!DOCTYPE HTML>
<html>
<head>
    <title>List dengan Link</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body{
            
        background-image: url("asep.jpg");
    background-size: cover;
    background-position: right center;
    background-repeat: no-repeat;
    margin: 0;
    min-height: 70vh;
        
                    }

        ul{
            list-style: none;
            padding: 0;
        }

        li{
            background: #87CEEB;
            color: blue;
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 15px;
            transition: 0.3s;
            cursor: pointer;
        }

        li:hover{
            background: #000080;
            transform: translateX(10px);
        
        
        }
    </style>
</head>

<body>
    <h1 style="color: #191970;
              font-weight: bold;
              font-style: impact;">Tugas DDPK</h1>
    <h2 style="color: darkblue;
              font-weight: bold;
              font-style: italic;"
              >Membuat List Dengan Link Didalamnya</h2>
    <ol>
        <li><a href="https://numenur41-maker.github.io/belajarku/">Bubur Ayam </a></li>
        <li><a href="https://numenur41-maker.github.io/web2/">Ayam Bumbu</a></li>
        <li><a href="https://numenur41-maker.github.io/web3/">Ayam Balado</a></li>
    </ol>
</body>
</html>
